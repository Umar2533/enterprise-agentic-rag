<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const STORAGE_KEY = "enterprise_rag_frontend_auth";

      function send(type, data) {
        window.parent.postMessage(
          Object.assign({ isStreamlitMessage: true, type }, data || {}),
          "*"
        );
      }

      function setValue(value) {
        send("streamlit:setComponentValue", { value });
      }

      send("streamlit:componentReady", { apiVersion: 1 });
      send("streamlit:setFrameHeight", { height: 0 });

      window.addEventListener("message", (event) => {
        const message = event.data || {};
        if (message.type !== "streamlit:render") {
          return;
        }

        const args = message.args || {};
        const action = args.action || "load";
        try {
          if (action === "save") {
            window.localStorage.setItem(STORAGE_KEY, args.payload || "");
            setValue({ ok: true, action });
          } else if (action === "clear") {
            window.localStorage.removeItem(STORAGE_KEY);
            setValue({ ok: true, action });
          } else {
            setValue({
              ok: true,
              action: "load",
              payload: window.localStorage.getItem(STORAGE_KEY) || "",
            });
          }
        } catch (error) {
          setValue({ ok: false, action, error: String(error) });
        }
      });
    </script>
  </head>
  <body></body>
</html>
